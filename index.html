<!DOCTYPE html>
<html lang="cn">
<head>
<!-- Required meta tags -->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
<!-- Bootstrap CSS -->
<link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/css/bootstrap.min.css" rel="stylesheet">
<title>Guitar Chord Generator - ImGYX</title>
<style>
.col-1-7, col-xs-1-7, .col-sm-1-7, .col-md-1-7, .col-lg-1-7 {
	position: relative;
	min-height: 1px;
	padding-right: 15px;
	padding-left: 15px;
}
.col-1-7, .col-xs-1-7 { width: 14.2857%; float: left; }

.string-fret, .string-text, .string-tuning, .barre {
	text-align: center;
}
</style>
</head>
<body>
	<div class="container mt-4">
		<h1 class="mb-4">吉他和弦生成器</h1>
		<div class="row">
		<div class="col-md-5">
			<div>
			<h2>和弦指法<small> (json)</small></h2>

			<form id="chord-json">
				<textarea name="chord" id="chord-input" rows="9" class="w-100"></textarea>
				<small>和弦的 JSON 数据。详情请参阅<a href="https://omnibrain.github.io/svguitar/docs/" target="_blank">文档</a>。</small>

				<div class="my-3">
					<button type="submit" class="btn btn-primary">生成和弦图</button>
				</div>
			</form>

			</div>
			<div class="mt-3">
			<h2>设置</h2>

			<form id="chart-config-form">
				<div class="row">
				<div class="form-group col-6 pr-2">
					<label for="chart-title">和弦名称</label>
					<input class="form-control" id="chart-title"
						name="title"
						type="text" placeholder="输入和弦名称"
					/>
				</div>
				<div class="form-group col-6 pr-2">
					<label for="chart-frets">起始品格</label>
					<input class="form-control" id="chart-position"
						name="position"
						type="number" step="1" placeholder="Enter position"
					/>
				</div>
				<div class="form-group col-6 pr-2">
					<label for="chart-frets">品格数量</label>
					<input class="form-control" id="chart-frets"
						name="frets"
						type="number" step="1" placeholder="Enter frets"
					/>
				</div>
				<div class="form-group col-6 pr-2">
					<label for="chart-strings">琴弦数量</label>
					<input class="form-control" id="chart-strings"
						name="strings"
						type="number" step="1" placeholder="Enter strings"
					/>
				</div>
				</div>
				
				<!-- 更多设置 开关 -->
				<a class="btn btn-sm btn-outline-secondary w-100 mb-3" id="toggleMore">
					更多设置 ▼
				</a>
				<!-- 更多设置内容（默认隐藏） -->
				<div id="moreSettings" class="row" style="display:none;">
				<div class="form-group col-6 pr-2">
					<label for="chart-orientation">方向</label>
					<select name="orientation" class="form-control" id="chart-orientation">
						<option value="vertical" selected="selected">垂直</option>
						<option value="horizontal">水平</option>
					</select>
				</div>
				<div class="form-group col-6 pr-2">
					<label for="chart-style">风格</label>
					<select name="style" class="form-control" id="chart-style">
						<option value="normal" selected="selected">正常</option>
						<option value="handdrawn">手绘</option>
					</select>
				</div>
				
				<div class="form-group col-6 pr-2">
					<label for="chart-titleFontSize">标题字体大小</label>
					<input class="form-control" id="chart-titleFontSize"
						name="titleFontSize"
						type="number" step="1" placeholder="默认：48"
					/>
				</div>
				<div class="form-group col-6 pr-2">
					<label for="chart-titleColor">标题字体颜色</label>
					<input class="form-control" id="chart-titleColor"
						name="titleColor"
						type="text" placeholder="#000000"
					/>
				</div>
				
				<div class="form-group col-6 pr-2">
					<label for="chart-fingerSize">手指大小 <small>(相对琴弦间距)</small></label>
					<input class="form-control" id="chart-fingerSize"
						name="fingerSize"
						type="number" step=".01" placeholder="默认：0.65"
					/>
				</div>
				<div class="form-group col-6 pr-2">
					<label for="chart-fingerTextSize">手指文字大小</label>
					<input class="form-control" id="chart-fingerTextSize"
						name="fingerTextSize"
						type="text" step="1" placeholder="默认：22"
					/>
				</div>
				
				<div class="form-group">
					<label for="chart-stringColor">String Color</label>
					<input class="form-control" id="chart-stringColor"
						name="stringColor"
						type="text" placeholder="String Color"
					/>
				</div>
				<div class="form-group">
					<label for="chart-color">Color</label>
					<input class="form-control" id="chart-color"
						name="color"
						type="text" placeholder="Enter chart color"
					/>
				</div>
				
				<div class="form-group col-6 pr-2">
					<label for="chart-color">琴枕粗细</label>
					<input class="form-control" id="nut-size"
						name="nutSize"
						type="number" step="0.01" placeholder="Enter nut size"
					/>
				</div>
				<div class="form-group col-6 pr-2">
					<label for="chart-color">线条粗细</label>
					<input class="form-control" id="stroke-width"
						name="strokeWidth"
						type="text" placeholder="Enter stroke width"
					/>
				</div>
				</div>
			</form>
			</div>
		</div>
		<div class="col-md-6 offset-md-1">
			<div class="mb-3">
				<h2>和弦指法</h2>
				<form id="chord-form">
					<div class="card p-2 mb-2">
					<!-- 琴弦顺序：6 5 4 3 2 1 -->
					<div class="row mb-2 no-gutters text-center font-weight-bold" style="display: grid; grid-template-columns: repeat(7, 1fr);">
						<div class="col px-2 text-center font-weight-bold">琴弦</div>
						<div class="col px-2">6弦</div>
						<div class="col px-2">5弦</div>
						<div class="col px-2">4弦</div>
						<div class="col px-2">3弦</div>
						<div class="col px-2">2弦</div>
						<div class="col px-2">1弦</div>
					</div>
					<!-- 品格输入 -->
					<div class="row mb-2 no-gutters">
						<div class="col px-2 text-center font-weight-bold d-flex justify-content-center align-items-center">品格</div>
						<div class="col px-2"><input type="text" class="form-control form-control-sm w-100 string-fret" data-string="6" placeholder="品/x/0"></div>
						<div class="col px-2"><input type="text" class="form-control form-control-sm w-100 string-fret" data-string="5" placeholder="品/x/0"></div>
						<div class="col px-2"><input type="text" class="form-control form-control-sm w-100 string-fret" data-string="4" placeholder="品/x/0"></div>
						<div class="col px-2"><input type="text" class="form-control form-control-sm w-100 string-fret" data-string="3" placeholder="品/x/0"></div>
						<div class="col px-2"><input type="text" class="form-control form-control-sm w-100 string-fret" data-string="2" placeholder="品/x/0"></div>
						<div class="col px-2"><input type="text" class="form-control form-control-sm w-100 string-fret" data-string="1" placeholder="品/x/0"></div>
					</div>
					<!-- 文字（可选） -->
					<div class="row no-gutters">
						<div class="col px-2 col-1-7 text-center font-weight-bold d-flex justify-content-center align-items-center">文字</div>
						<div class="col px-2 col-1-7"><input type="text" class="form-control form-control-sm string-text" data-string="6" placeholder="1~4"></div>
						<div class="col px-2 col-1-7"><input type="text" class="form-control form-control-sm string-text" data-string="5" placeholder="1~4"></div>
						<div class="col px-2 col-1-7"><input type="text" class="form-control form-control-sm string-text" data-string="4" placeholder="1~4"></div>
						<div class="col px-2 col-1-7"><input type="text" class="form-control form-control-sm string-text" data-string="3" placeholder="1~4"></div>
						<div class="col px-2 col-1-7"><input type="text" class="form-control form-control-sm string-text" data-string="2" placeholder="1~4"></div>
						<div class="col px-2 col-1-7"><input type="text" class="form-control form-control-sm string-text" data-string="1" placeholder="1~4"></div>
					</div>
					</div>
					<!-- 大横按 -->
					<div class="card p-2 mb-3">
						<div class="form-group form-check mb-1">
							<input type="checkbox" class="form-check-input" id="barre_enable">
							<label class="form-check-label">启用大横按设置</label>
						</div>
						<div class="row no-gutters">
							<div class="col-3 px-2">
								<label class="mb-1" for="chart-barre">从几弦</label>
								<input type="number" class="form-control form-control-sm barre" id="barre_from" min="0" max="7"  placeholder="从几弦, 例: 5">
							</div>
							<div class="col-3 px-2">
								<label class="mb-1" for="chart-barre">到几弦</label>
								<input type="number" class="form-control form-control-sm barre" id="barre_to" min="0" max="7" placeholder="到几弦, 例: 1">
							</div>
							<div class="col-3 px-2">
								<label class="mb-1" for="chart-barre">品格</label>
								<input type="number" class="form-control form-control-sm barre" id="barre_fret" min="0" placeholder="品格, 例: 1">
							</div>
							<div class="col-3 px-2">
								<label class="mb-1" for="chart-barre">文字</label>
								<input type="text"   class="form-control form-control-sm barre" id="barre_text" placeholder="文字(可选)">
							</div>
						</div>
					</div>
					
					<!-- 调音 -->
					<!--
					<div class="card p-2 mb-3">
						<div class="form-group form-check mb-1">
							<input type="checkbox" class="form-check-input" id="tuning_enable">
							<label class="form-check-label">启用调音</label>
						</div>
						<div class="row mb-2 no-gutters text-center font-weight-bold" style="display: grid; grid-template-columns: repeat(7, 1fr);">
						<div class="col px-2 text-center font-weight-bold">琴弦</div>
						<div class="col px-2">6弦</div>
						<div class="col px-2">5弦</div>
						<div class="col px-2">4弦</div>
						<div class="col px-2">3弦</div>
						<div class="col px-2">2弦</div>
						<div class="col px-2">1弦</div>
					</div>
					-->
					<!-- 品格输入 -->
					<!--
					<div class="row mb-2 no-gutters">
						<div class="col px-2 text-center font-weight-bold d-flex justify-content-center align-items-center">调音</div>
						<div class="col px-2"><input type="text" class="form-control form-control-sm w-100 string-tuning" data-string="6" placeholder="E"></div>
						<div class="col px-2"><input type="text" class="form-control form-control-sm w-100 string-tuning" data-string="5" placeholder="A"></div>
						<div class="col px-2"><input type="text" class="form-control form-control-sm w-100 string-tuning" data-string="4" placeholder="D"></div>
						<div class="col px-2"><input type="text" class="form-control form-control-sm w-100 string-tuning" data-string="3" placeholder="G"></div>
						<div class="col px-2"><input type="text" class="form-control form-control-sm w-100 string-tuning" data-string="2" placeholder="B"></div>
						<div class="col px-2"><input type="text" class="form-control form-control-sm w-100 string-tuning" data-string="1" placeholder="E"></div>
					</div>
					</div>
					-->
				<div class="my-3">
					<button type="submit" class="btn btn-primary">生成和弦图</button>
				</div>
				</form>
			</div>
			<div class="card p-2">
				<h2>结果</h2>
				<div id="result"></div>
			</div>
		</div>
		</div>
<footer class="bg-light text-center mt-4 p-1">
	本工具使用了 <a href="https://omnibrain.github.io/svguitar/" target="_blank">SVGuitar</a>。
	@GYX 2026
</footer>

	<!-- Optional JavaScript -->
	<!-- jQuery first, then Popper.js, then Bootstrap JS -->
	<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
	<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/js/bootstrap.min.js"></script>
	<script src="./js/svguitar.umd.js"></script>

<script>
;(function () {
	var initialSettings = {
		color: '#000000',
		backgroundColor: 'none',
		fingerSize: 0.85,			// 手指大小，相对于琴弦间距，默认0.65
		//fingerColor: '#000',		// 手指颜色
		//fingerTextColor: '#FFF',	// 手指字体颜色
		fingerTextSize: 40,		// 手指字体大小，默认22
		fretSize: 1.3,			// 品格高度，相对于琴弦间距，默认1.5
		barreChordRadius: 0.45,	// 大横按和弦半径，默认0.25
		emptyStringIndicatorSize: 0.5,	// 空弦上方‘X’和‘O’的符号大小，默认0.6
		title: 'B',	// 和弦名称
		titleFontSize: 64,	// 默认48
		titleColor: '#000000',
		strings: 6,			// 琴弦数量
		stringColor: '#000000',
		frets: 4,				// 品格数量
		//fretColor: '#000000',
		position: 1,			// 起始品格
		nutSize: 0.65,		// 琴枕粗细
		strokeWidth: 2.5,		// 线条粗细，默认2
		fretMarkers: [
			2, 4, 6, 8, {
				fret: 11,
				double: true,
			},
		],
		showFretMarkers: true,
		style: 'normal',	// 风格
		orientation: 'vertical',	// 方向
		//tuning: ['E', 'A', 'D', 'G', 'B', 'E'],
		watermark: '© 2026 GYX',
	}

	// 定义默认和弦
	var initialChord = {
		// array of [string, fret | 'x' | 0, text]
		fingers: [
			[2, 4, '4'],
			[3, 4, '3'],
			[4, 4, '2'],
			[6, 'x']
		],

		// optional: barres for barre chords
		barres: [{
			fromString: 5, toString: 1, fret: 2, text: '1'
		}],
		tuning: [],
	}

	// 把默认值填到文本框里
	//$('#chord-input').val(JSON.stringify(initialChord, null, 2));
	// 和弦json格式化函数：支持 [2,2]、[2,4,"4"]、[6,"x"] 全部格式
	function formatChord(obj) {
		// 1. 先正常格式化
		let json = JSON.stringify(obj, null, "\t");

		// 2. 只压缩「2个元素」的数组 → [6, "x"]
		json = json.replace(/\[\s*(\S+)\s*,\s*(\S+)\s*\]/g, "[$1, $2]");

		// 3. 只压缩「3个元素」的数组 → [2, 4, "4"]
		json = json.replace(/\[\s*(\S+)\s*,\s*(\S+)\s*,\s*(\S+)\s*\]/g, "[$1, $2, $3]");

		return json;
	}

	// 填入输入框
	$('#chord-input').val(formatChord(initialChord));

	// 自动填充和弦指法默认值到输入框
	function fillDefaultValues() {
		// 填充弦品 & 文字
		initialChord.fingers.forEach(item => {
			const str = item[0];
			const fret = item[1];
			const text = item[2] || '';
			$(`.string-fret[data-string="${str}"]`).val(fret);
			$(`.string-text[data-string="${str}"]`).val(text);
		});

		// 填充横按
		if (initialChord.barres && initialChord.barres.length > 0) {
			const b = initialChord.barres[0];
			$('#barre_enable').prop('checked', true);
			$('#barre_from').val(b.fromString);
			$('#barre_to').val(b.toString);
			$('#barre_fret').val(b.fret);
			$('#barre_text').val(b.text || '');
		}
	}

	// 把默认值填到输入框里
	Object.keys(initialSettings).forEach(function (name) {
		$('#chart-config-form [name=' + name + ']').val(initialSettings[name])
	})

	// 读取和弦表单，#chord-form
	function buildChordFromForm() {
		// 读取6~1弦
		let fingers = [];
		$('.string-fret').each(function () {
			const str = $(this).data('string');
			const fretVal = $(this).val().trim();
			const textVal = $(`.string-text[data-string="${str}"]`).val().trim();

			if (fretVal === '') return;

			const item = [str, fretVal === 'x' ? 'x' : Number(fretVal)];
			if (textVal !== '') item.push(textVal);
			fingers.push(item);
		});

		// 读取横按
		let barres = [];
		if ($('#barre_enable').is(':checked')) {
			const from = Number($('#barre_from').val());
			const to = Number($('#barre_to').val());
			const fret = Number($('#barre_fret').val());
			const text = $('#barre_text').val().trim();

			if (!isNaN(from) && !isNaN(to) && !isNaN(fret)) {
				const barre = { fromString: from, toString: to, fret: fret };
				if (text !== '') barre.text = text;
				barres.push(barre);
			}
		}
		return { fingers, barres };
		
		// 读取横按
	}

	// 【JSON → 表单】把 JSON 数据填充回输入框
	function fillChordToForm(chord) {
		// 清空所有输入
		$('.string-fret').val('');
		$('.string-text').val('');
		$('#barre_enable').prop('checked', false);
		$('#barre_from').val('');
		$('#barre_to').val('');
		$('#barre_fret').val('');
		$('#barre_text').val('');

		// 填充 fingers
		if (chord.fingers) {
			chord.fingers.forEach(item => {
				const str = item[0];
				const fret = item[1];
				const text = item[2] || '';
				$(`.string-fret[data-string="${str}"]`).val(fret);
				$(`.string-text[data-string="${str}"]`).val(text);
			});
		}

		// 填充 barres
		if (chord.barres && chord.barres.length > 0) {
			const b = chord.barres[0];
			$('#barre_enable').prop('checked', true);
			$('#barre_from').val(b.fromString);
			$('#barre_to').val(b.toString);
			$('#barre_fret').val(b.fret);
			$('#barre_text').val(b.text || '');
		}
	}

	// 读取图表配置（全局共用）
	function getSettings() {
		return $('#chart-config-form').serializeArray().reduce((acc, cur) => {
			acc[cur.name] = isNaN(cur.value) ? cur.value : Number(cur.value);
			return acc;
		}, {});
	}

	// 画图函数
	function drawChord(chord, settings) {
		//console.log('Drawing chord ', chord, ' with settings', settings)
		console.log('使用设置', settings, '绘制和弦', chord)

		try {
				const safeChord = {
					fingers: chord.fingers || [],
					barres: chord.barres || []
				};
				chart.configure(settings).chord(chord).draw()
			} catch (err) {
				alert('错误：' + err.message)

			throw err
		}
	}

	// initialize chart 初始化图表
	var chart = new svguitar.SVGuitarChord('#result')
		.configure(initialSettings)
		.chord(initialChord)

	// 提交 chord-form → 读取配置 + 更新JSON + 画图
	$('#chord-form').submit(function (e) {
		e.preventDefault();	// 不让页面刷新
		var chord = buildChordFromForm();
		var settings = getSettings();
		$('#chord-input').val(formatChord(chord));
		drawChord(chord, settings);
	});

	// 提交 chord-json → 读取配置 + 更新表单 + 画图
	$('#chord-json').submit(function (e) {
		e.preventDefault();	// 不让页面刷新
		try {
			var chord = JSON.parse($('#chord-input').val());
			var settings = getSettings();
			fillChordToForm(chord);
			drawChord(chord, settings);
		} catch (err) {
			alert('Failed to parse the chord. Are you sure you entered valid JSON?')
		}
	});

	//$('#chart-config-form,#chord-json').submit(function (e) {
	$('#chart-xxx').submit(function (e) {
		e.preventDefault()	// 不让页面刷新

		// 读取表单所有配置
		var settings = $('#chart-config-form')
		.serializeArray()
		.reduce(function (acc, cur) {
			acc[cur.name] = isNaN(cur.value) ? cur.value : Number(cur.value)

			return acc
		}, {})

		// 读取和弦 JSON
		try {
			var chord = JSON.parse($('#chord-input').val())
		} catch (err) {
		alert('Failed to parse the chord. Are you sure you entered valid JSON?')

		return
		}
		// 画和弦图
		drawChord(chord, settings)
	})

	// 打开页面显示默认和弦
	fillDefaultValues();
	drawChord(initialChord, initialSettings)
})()

// 更多设置折叠/展开
$('#toggleMore').click(function(e) {
  e.preventDefault();
  const more = $('#moreSettings');
  if (more.is(':hidden')) {
    more.show();
    $(this).html('隐藏设置 ▲');
  } else {
    more.hide();
    $(this).html('更多设置 ▼');
  }
});
</script>

</body>
</html>
